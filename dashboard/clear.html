<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AlphaGrid — Session Reset</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#020408;color:#f0f6ff;font-family:'Space Grotesk',system-ui,sans-serif;
     display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:16px}
.logo{font-size:18px;font-weight:800;letter-spacing:.15em;color:#3b82f6}
.msg{font-size:12px;color:#4a6070;letter-spacing:.1em}
</style>
</head>
<body>
<div class="logo">ALPHAGRID</div>
<div class="msg">CLEARING SESSION — REDIRECTING TO LOGIN</div>
<script>
localStorage.removeItem('ag_access_token');
localStorage.removeItem('ag_refresh_token');
localStorage.removeItem('ag_user');
sessionStorage.clear();
setTimeout(function(){ window.location.replace('/login'); }, 800);
</script>
</body>
</html>
